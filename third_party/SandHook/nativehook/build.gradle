plugins {
    id 'com.android.library'
}

android {
    namespace "com.swift.sandhook.nativehook"
    compileSdk 36

    defaultConfig {
        minSdk 21
        consumerProguardFiles "proguard-rules.pro"
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared", "-DBUILD_TESTING=OFF"
                cppFlags "-frtti -fexceptions -Wpointer-arith"
            }
        }
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    sourceSets {
        main {
            java.srcDirs = ["src/main/java"]
            manifest.srcFile "src/main/AndroidManifest.xml"
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    ndkVersion "28.0.13004108"

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    publishing {
        singleVariant('release')
    }
}

apply from: rootProject.file('gradle/publish-atrace.gradle.kts')
